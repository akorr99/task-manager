      if (t.status !== 'done') html += `<button title="완료" onclick="quickDone('${t.id}')">&#9989;</button>`;
      if (t.status === 'done') {
        html += `<button title="완료 취소" onclick="quickUndone('${t.id}')">&#8617;&#65039;</button>`;
        html += `<button title="보관" onclick="archiveTask('${t.id}')">📦</button>`;
      }
      html += `<button title="수정" onclick="openModal('${t.id}')">&#9998;&#65039;</button>`;
      html += `<button title="삭제" onclick="quickDelete('${t.id}')">&#128465;</button>`;
    }
    html += `</td></tr>`;
  });
  html += '</tbody></table>';
  container.innerHTML = html;
}

function filterByTag(tag) {
  document.getElementById('filterTag').value = tag;
  render();
}

// ===== Calendar View =====
function renderCalendar() {
  const container = document.getElementById('calendarView');
  const today = todayStr();
  const first = new Date(calYear, calMonth, 1);
  const last = new Date(calYear, calMonth + 1, 0);
  const startDay = first.getDay();
  const daysInMonth = last.getDate();
  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  let html = `<div class="cal-header">
    <div class="cal-nav"><button onclick="changeMonth(-1)">&lt;</button></div>
    <h2>${calYear}년 ${monthNames[calMonth]}</h2>
    <div class="cal-nav">
      <button onclick="changeMonth(1)">&gt;</button>
      <button onclick="goToday()" style="margin-left:8px;">오늘</button>
    </div>
  </div>`;
  html += '<div class="cal-grid">';
  ['일','월','화','수','목','금','토'].forEach(d => { html += `<div class="cal-day-header">${d}</div>`; });

  const taskMap = {};
  const noDateTasks = [];
  const cat = document.getElementById('filterCat').value;
  const status = document.getElementById('filterStatus').value;
  const priority = document.getElementById('filterPriority').value;
  const tag = document.getElementById('filterTag').value;
  const showArchived = document.getElementById('showArchived').checked;
  tasks.forEach(t => {
    // Archive filter
    if (showArchived) {
      if (!t.archived) return;
    } else {
      if (t.archived) return;
    }
    if (cat !== 'all' && t.category !== cat) return;
    if (status !== 'all' && t.status !== status) return;
    if (priority !== 'all' && (t.priority || 'none') !== priority) return;
    if (tag !== 'all' && (!t.tags || !t.tags.includes(tag))) return;
    // Search filter
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const searchText = `${t.student || ''} ${t.task || ''} ${t.memo || ''} ${(t.tags || []).join(' ')}`.toLowerCase();
      if (!searchText.includes(q)) return;
    }
    const eff = getEffectiveDueDate(t);
    if (!eff) { noDateTasks.push(t); return; }
    if (!taskMap[eff]) taskMap[eff] = [];
    taskMap[eff].push(t);
  });

  const prevLast = new Date(calYear, calMonth, 0).getDate();
  for (let i = startDay - 1; i >= 0; i--) {
    const d = prevLast - i;
    const m = calMonth === 0 ? 11 : calMonth - 1;
    const y = calMonth === 0 ? calYear - 1 : calYear;
    const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    html += renderCalCell(d, ds, true, today, taskMap[ds]);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    html += renderCalCell(d, ds, false, today, taskMap[ds]);
  }
  const totalCells = startDay + daysInMonth;
  const remaining = (7 - totalCells % 7) % 7;
  for (let d = 1; d <= remaining; d++) {
    const m = calMonth === 11 ? 0 : calMonth + 1;
    const y = calMonth === 11 ? calYear + 1 : calYear;
    const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    html += renderCalCell(d, ds, true, today, taskMap[ds]);
  }
  html += '</div>';

  // No-date tasks section
  if (noDateTasks.length > 0) {
    html += '<div style="padding:12px 20px;border-top:1px solid var(--border);">';
    html += '<div style="font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:8px;">&#128204; 마감일 미정</div>';
    html += '<div style="display:flex;flex-wrap:wrap;gap:6px;">';
    noDateTasks.forEach(t => {
      const doneCls = t.status === 'done' ? ' status-done' : '';
      html += `<div class="cal-task ${catClasses[t.category]}${doneCls}" style="position:static;white-space:nowrap;" onclick="openModal('${t.id}')" title="${esc(t.student || '')} - ${esc(t.task)}">${esc(t.student ? t.student + ': ' : '')}${esc(t.task)}</div>`;
    });
    html += '</div></div>';
  }

  container.innerHTML = html;
}

function renderCalCell(day, dateStr, otherMonth, today, dayTasks) {
  const isToday = dateStr === today;
  const cls = [otherMonth ? 'other-month' : '', isToday ? 'today' : ''].filter(Boolean).join(' ');
  const dow = new Date(dateStr).getDay();
  const dayCls = dow === 0 ? 'sunday' : dow === 6 ? 'saturday' : '';
  let html = `<div class="cal-cell ${cls}">`;
  html += `<div class="cal-date ${dayCls}">${day}</div>`;
  if (dayTasks && dayTasks.length > 0) {
    dayTasks.slice(0, 3).forEach(t => {
      const doneCls = t.status === 'done' ? ' status-done' : '';
      const si = getStepsDone(t);
      const progressChip = si ? `<span class="cal-progress">${si.done}/${si.total}</span>` : '';
      const priDot = t.priority && t.priority !== 'none' ? `<span style="color:var(--${t.priority === 'high' ? 'red' : t.priority === 'medium' ? 'yellow' : 'blue'});font-size:8px;">●</span> ` : '';
      html += `<div class="cal-task ${catClasses[t.category]}${doneCls}" onclick="openModal('${t.id}')" title="${esc(t.student || '')} - ${esc(t.task)}">${priDot}${esc(t.student ? t.student + ': ' : '')}${esc(t.task)}${progressChip}</div>`;
    });
    if (dayTasks.length > 3) html += `<div class="cal-more" onclick="event.stopPropagation();openCalPopover('${dateStr}',this)">+${dayTasks.length - 3}개 더</div>`;
  }
  html += '</div>';
  return html;
}

function openCalPopover(dateStr, el) {
  const cat = document.getElementById('filterCat').value;
  const status = document.getElementById('filterStatus').value;
  const dayTasks = tasks.filter(t => {
    if (cat !== 'all' && t.category !== cat) return false;
    if (status !== 'all' && t.status !== status) return false;
    return getEffectiveDueDate(t) === dateStr;
  });
  if (dayTasks.length === 0) return;

  const catColors = { online: 'var(--blue)', offline: 'var(--pink)', payment: 'var(--accent)', other: 'var(--green)' };
  const d = new Date(dateStr);
  const label = `${d.getMonth()+1}월 ${d.getDate()}일`;

  let html = `<div class="pop-header"><span class="pop-date">${label} (${dayTasks.length}건)</span><button class="pop-close" onclick="closeCalPopover()">&times;</button></div>`;
  dayTasks.forEach(t => {
    const doneCls = t.status === 'done' ? ' status-done' : '';
    const si = getStepsDone(t);
    const prog = si ? ` <span style="font-size:10px;color:var(--text-muted);">${si.done}/${si.total}</span>` : '';
    html += `<div class="pop-task${doneCls}" onclick="closeCalPopover();openModal('${t.id}')">
      <span class="pop-dot" style="background:${catColors[t.category] || 'var(--text-muted)'}"></span>
      <span class="pop-text">${esc(t.student ? t.student + ': ' : '')}${esc(t.task)}${prog}</span>
      <span class="badge ${statusClasses[t.status]}" style="font-size:9px;padding:1px 6px;">${statusLabels[t.status]}</span>
    </div>`;
  });

  const popover = document.getElementById('calPopover');
  popover.innerHTML = html;
  popover.style.display = 'block';

  // Position near clicked element
  const rect = el.getBoundingClientRect();
  let top = rect.bottom + 6;
  let left = rect.left;
  // Keep within viewport
  if (top + 360 > window.innerHeight) top = rect.top - 320;
  if (left + 300 > window.innerWidth) left = window.innerWidth - 320;
  if (left < 10) left = 10;
  popover.style.top = top + 'px';
  popover.style.left = left + 'px';

  document.getElementById('calPopoverOverlay').classList.add('show');
}

function closeCalPopover() {
  document.getElementById('calPopover').style.display = 'none';
  document.getElementById('calPopoverOverlay').classList.remove('show');
}

function changeMonth(delta) {
  calMonth += delta;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
}

function goToday() {
  const n = new Date();
  calYear = n.getFullYear();
  calMonth = n.getMonth();
  renderCalendar();
}

// ===== View Switching =====
function setView(view) {
  currentView = view;
  document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
  if (view === 'table') {
    document.querySelectorAll('.view-toggle button')[0].classList.add('active');
    document.getElementById('tableView').style.display = '';
    document.getElementById('calendarView').style.display = 'none';
  } else {
    document.querySelectorAll('.view-toggle button')[1].classList.add('active');
    document.getElementById('tableView').style.display = 'none';
    document.getElementById('calendarView').style.display = '';
  }
  render();
}

function render() {
  updateTagFilter();
  renderTable();
  renderCalendar();
  updateSummary();
}

// ===== Modal =====
function openModal(id) {
  const modal = document.getElementById('modal');
  const titleEl = document.getElementById('modalTitle');
  const delBtn = document.getElementById('btnDelete');
  document.getElementById('editId').value = '';

  if (id) {
    const t = tasks.find(x => x.id === id);
    if (!t) return;
    titleEl.textContent = '할일 수정';
    document.getElementById('editId').value = id;
    document.getElementById('fStudent').value = t.student || '';
    document.getElementById('fTask').value = t.task || '';
    document.getElementById('fCategory').value = t.category || 'other';
    document.getElementById('fPriority').value = t.priority || 'none';
    document.getElementById('fDeadlineType').value = t.deadlineType || 'date';
    document.getElementById('fDueDate').value = t.dueDate || '';
    document.getElementById('fRange').value = t.range || 'this_week';
    document.getElementById('fStatus').value = t.status || 'pending';
    document.getElementById('fMemo').value = t.memo || '';
    currentTags = t.tags ? [...t.tags] : [];
    renderTagsInput();
    toggleDeadlineInputs();
    delBtn.style.display = '';
    document.getElementById('stepsSection').style.display = '';
    document.getElementById('historySection').style.display = '';
    renderSteps(id);
    renderHistory(id);
  } else {
    titleEl.textContent = '새 할일 추가';
    document.getElementById('fStudent').value = '';
    document.getElementById('fTask').value = '';
    document.getElementById('fCategory').value = 'online';
    document.getElementById('fPriority').value = 'none';
    document.getElementById('fDeadlineType').value = 'date';
    document.getElementById('fDueDate').value = todayStr();
    document.getElementById('fRange').value = 'this_week';
    document.getElementById('fStatus').value = 'pending';
    document.getElementById('fMemo').value = '';
    currentTags = [];
    renderTagsInput();
    toggleDeadlineInputs();
    delBtn.style.display = 'none';
    document.getElementById('stepsSection').style.display = 'none';
    document.getElementById('historySection').style.display = 'none';
  }
  modal.classList.add('show');
  setTimeout(() => document.getElementById('fStudent').focus(), 100);
}

function closeModal() { document.getElementById('modal').classList.remove('show'); }

function saveTask() {
  const id = document.getElementById('editId').value;
  const deadlineType = document.getElementById('fDeadlineType').value;
  const task = {
    id: id || crypto.randomUUID(),
    student: document.getElementById('fStudent').value.trim(),
    task: document.getElementById('fTask').value.trim(),
    category: document.getElementById('fCategory').value,
    priority: document.getElementById('fPriority').value,
    deadlineType: deadlineType,
    dueDate: deadlineType === 'date' ? document.getElementById('fDueDate').value : '',
    range: deadlineType === 'range' ? document.getElementById('fRange').value : '',
    status: document.getElementById('fStatus').value,
    memo: document.getElementById('fMemo').value.trim(),
    tags: [...currentTags],
  };
  if (!task.task) { alert('할 일을 입력해주세요.'); return; }
  if (id) {
    const existing = tasks.find(t => t.id === id);
    if (existing) {
      // Preserve steps, history, createdAt, order, archived
      task.steps = existing.steps || [];
      task.history = existing.history || [];
      task.createdAt = existing.createdAt || '';
      task.order = existing.order;
      task.archived = existing.archived;
      task.archivedAt = existing.archivedAt;
      // Log status change
      if (existing.status !== task.status) {
        addHistory(task, { type: 'status', from: statusLabels[existing.status] || existing.status, to: statusLabels[task.status] || task.status });
      }
      const idx = tasks.findIndex(t => t.id === id);
      if (idx >= 0) tasks[idx] = task;
    }
  } else {
    task.steps = [];
    task.history = [];
    task.createdAt = nowTimestamp();
    addHistory(task, { type: 'created', text: '할일 생성' });
    tasks.push(task);
  }
  save(); closeModal(); render(); updateTagFilter();
}

function deleteTask() {
  const id = document.getElementById('editId').value;
  if (!id) return;
  if (!confirm('정말 삭제하시겠습니까?')) return;
  tasks = tasks.filter(t => t.id !== id);
  save(); closeModal(); render();
}

function quickDone(id) {
  const t = tasks.find(x => x.id === id);
  if (t) {
    const from = statusLabels[t.status] || t.status;
    t.status = 'done';
    if (!t.history) t.history = [];
    addHistory(t, { type: 'status', from: from, to: '완료' });
    save(); render();
  }
}

function quickUndone(id) {
  const t = tasks.find(x => x.id === id);
  if (t) {
    if (!t.history) t.history = [];
    addHistory(t, { type: 'status', from: '완료', to: '진행중' });
    t.status = 'progress';
    save(); render();
  }
}

function quickDelete(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  const label = `${t.student || ''} - ${t.task}`;
  if (!confirm(`"${label}" 을(를) 삭제하시겠습니까?`)) return;
  tasks = tasks.filter(x => x.id !== id);
  save(); render();
}

function progressColor(pct) {
  if (pct <= 0) return '#333';
  if (pct < 30) return '#ff6b6b';
  if (pct < 60) return '#ffa94d';
  if (pct < 90) return '#74c0fc';
  if (pct < 100) return '#51cf66';
  return '#20c997';
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ===== Steps Management =====
function renderSteps(taskId) {
  const t = tasks.find(x => x.id === taskId);
  if (!t) return;
  if (!t.steps) t.steps = [];
  const list = document.getElementById('stepList');
  const info = getStepsDone(t);
  const countEl = document.getElementById('stepsCount');
  const barEl = document.getElementById('stepsProgressFill');

  if (info) {
    const pct = Math.round((info.done / info.total) * 100);
    countEl.textContent = `${info.done}/${info.total} (${pct}%)`;
    barEl.style.width = pct + '%';
    barEl.style.background = progressColor(pct);
  } else {
    countEl.textContent = '';
    barEl.style.width = '0%';
  }

  list.innerHTML = '';
  t.steps.forEach(s => {
    const li = document.createElement('li');
    li.className = 'step-item';
    li.innerHTML = `
      <input type="checkbox" ${s.done ? 'checked' : ''} onchange="toggleStep('${taskId}','${s.id}',this.checked)">
      <span class="step-text ${s.done ? 'done' : ''}">${esc(s.text)}</span>
      ${s.doneAt ? '<span class="step-done-at">' + esc(s.doneAt) + '</span>' : ''}
      <button class="step-del" onclick="deleteStep('${taskId}','${s.id}')">&times;</button>
    `;
    list.appendChild(li);
  });
}

function addStep() {
  const taskId = document.getElementById('editId').value;
  if (!taskId) return;
  const input = document.getElementById('stepInput');
  const text = input.value.trim();
  if (!text) return;
  const t = tasks.find(x => x.id === taskId);
  if (!t) return;
  if (!t.steps) t.steps = [];
  const step = { id: crypto.randomUUID(), text: text, done: false, doneAt: null };
  t.steps.push(step);
  addHistory(t, { type: 'step', text: `"${text}" 단계 추가` });
  save();
  input.value = '';
  renderSteps(taskId);
  render();
}

function toggleStep(taskId, stepId, checked) {
  const t = tasks.find(x => x.id === taskId);
  if (!t || !t.steps) return;
  const s = t.steps.find(x => x.id === stepId);
  if (!s) return;
  s.done = checked;
  s.doneAt = checked ? nowTimestamp() : null;
  addHistory(t, { type: 'step', text: `"${s.text}" ${checked ? '완료' : '취소'}` });
  save();
  // Update modal if open
  if (document.getElementById('editId').value === taskId) { renderSteps(taskId); renderHistory(taskId); }
  renderTable();
  renderCalendar();
  updateSummary();
}

function deleteStep(taskId, stepId) {
  const t = tasks.find(x => x.id === taskId);
  if (!t || !t.steps) return;
  const s = t.steps.find(x => x.id === stepId);
  if (!s) return;
  t.steps = t.steps.filter(x => x.id !== stepId);
  addHistory(t, { type: 'step', text: `"${s.text}" 단계 삭제` });
  save();
  if (document.getElementById('editId').value === taskId) { renderSteps(taskId); renderHistory(taskId); }
  renderTable();
  renderCalendar();
  updateSummary();
}

function toggleExpand(taskId) {
  if (expandedTasks.has(taskId)) expandedTasks.delete(taskId);
  else expandedTasks.add(taskId);
  renderTable();
}

function addInlineStep(taskId) {
  const input = document.getElementById('inlineStep_' + taskId);
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  const t = tasks.find(x => x.id === taskId);
  if (!t) return;
  if (!t.steps) t.steps = [];
  t.steps.push({ id: crypto.randomUUID(), text: text, done: false, doneAt: null });
  addHistory(t, { type: 'step', text: `"${text}" 단계 추가` });
  save();
  renderTable();
  // Refocus the input after re-render
  setTimeout(() => {
    const newInput = document.getElementById('inlineStep_' + taskId);
    if (newInput) newInput.focus();
  }, 50);
}

// ===== History =====
function renderHistory(taskId) {
  const t = tasks.find(x => x.id === taskId);
  const container = document.getElementById('historyList');
  if (!t || !t.history || t.history.length === 0) {
    container.innerHTML = '<div class="history-empty">아직 기록이 없습니다.</div>';
    return;
  }
  let html = '';
  // 최신순
  const sorted = [...t.history].reverse();
  sorted.forEach(h => {
    let content = '';
    if (h.type === 'created') content = '할일 생성';
    else if (h.type === 'status') content = `상태 변경: ${esc(h.from)} → ${esc(h.to)}`;
    else if (h.type === 'step') content = esc(h.text);
    else content = esc(h.text || '');
    html += `<div class="history-item type-${h.type || ''}">
      <span class="history-time">${esc(h.at || '')}</span>
      <span class="history-content">${content}</span>
    </div>`;
  });
  container.innerHTML = html;
}

// ===== Keyboard =====
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

    { id: crypto.randomUUID(), student: '-', task: '3월 수업비 정리', category: 'payment', deadlineType: 'range', dueDate: '', range: 'this_month', status: 'pending', memo: '', createdAt: `${today} 08:00`, steps: [], history: [{ at: `${today} 08:00`, type: 'created', text: '할일 생성' }] },
    { id: crypto.randomUUID(), student: '최유진', task: '교재 선정', category: 'offline', deadlineType: 'none', dueDate: '', range: '', status: 'pending', memo: '아직 일정 미정', createdAt: `${today} 08:00`, steps: [], history: [{ at: `${today} 08:00`, type: 'created', text: '할일 생성' }] },
