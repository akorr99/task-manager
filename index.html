<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#e8c47c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="수업관리">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%231e2030' width='100' height='100' rx='20'/><text x='50' y='68' font-size='50' text-anchor='middle' fill='%23e8c47c'>📋</text></svg>">
<title>수업 관리 대시보드</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg-primary: #1e2030;
    --bg-secondary: #262840;
    --bg-tertiary: #2e3050;
    --bg-hover: #363860;
    --bg-input: #232538;
    --border: #3a3c58;
    --border-light: #323450;
    --text-primary: #f0f0f5;
    --text-secondary: #b8b9d0;
    --text-muted: #7e80a0;
    --accent: #e8c47c;
    --accent-hover: #f2d798;
    --accent-dim: rgba(232,196,124,0.12);
    --green: #63e6a0;
    --green-dim: rgba(99,230,160,0.12);
    --red: #ff7b7b;
    --red-dim: rgba(255,123,123,0.1);
    --yellow: #ffb86c;
    --yellow-dim: rgba(255,184,108,0.1);
    --blue: #82d1ff;
    --blue-dim: rgba(130,209,255,0.1);
    --pink: #ee9cff;
    --pink-dim: rgba(238,156,255,0.1);
  }

  /* Light mode */
  [data-theme="light"] {
    --bg-primary: #f5f5f7;
    --bg-secondary: #ffffff;
    --bg-tertiary: #e8e8ec;
    --bg-hover: #d8d8dc;
    --bg-input: #ffffff;
    --border: #d0d0d8;
    --border-light: #e0e0e5;
    --text-primary: #1a1a2e;
    --text-secondary: #4a4a60;
    --text-muted: #8080a0;
    --accent: #c9a050;
    --accent-hover: #b08930;
    --accent-dim: rgba(201,160,80,0.15);
    --green: #2ecc71;
    --green-dim: rgba(46,204,113,0.15);
    --red: #e74c3c;
    --red-dim: rgba(231,76,60,0.12);
    --yellow: #f39c12;
    --yellow-dim: rgba(243,156,18,0.12);
    --blue: #3498db;
    --blue-dim: rgba(52,152,219,0.12);
    --pink: #9b59b6;
    --pink-dim: rgba(155,89,182,0.12);
  }
  [data-theme="light"] .bg-orb { opacity: 0 !important; }
  [data-theme="light"] .bg-grain { opacity: 0.15; }
  [data-theme="light"] .header::before { opacity: 0.5; }
  [data-theme="light"] .header h1 { -webkit-text-fill-color: var(--text-primary); background: none; }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    letter-spacing: 0.01em;
    min-height: 100vh;
    position: relative;
  }
  ::selection { background: var(--accent); color: #111; }

  /* ===== MESH GRADIENT BACKGROUND ===== */
  .bg-layer { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
  .bg-orb {
    position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0;
    animation: orbReveal 1.5s ease-out forwards, orbFloat 20s ease-in-out infinite;
  }
  .bg-orb:nth-child(1) { width: 50vw; height: 50vw; max-width: 600px; max-height: 600px; top: -15%; left: -10%; background: rgba(80,100,200,0.18); animation-delay: 0s, 0s; }
  .bg-orb:nth-child(2) { width: 40vw; height: 40vw; max-width: 500px; max-height: 500px; top: -10%; right: -8%; background: rgba(160,90,200,0.12); animation-delay: 0.2s, 0.2s; }
  .bg-orb:nth-child(3) { width: 45vw; height: 45vw; max-width: 550px; max-height: 550px; bottom: -15%; right: -5%; background: rgba(232,196,124,0.1); animation-delay: 0.4s, 0.4s; }
  .bg-orb:nth-child(4) { width: 35vw; height: 35vw; max-width: 420px; max-height: 420px; bottom: -10%; left: -5%; background: rgba(80,180,160,0.1); animation-delay: 0.6s, 0.6s; }
  .bg-orb:nth-child(5) { width: 25vw; height: 25vw; max-width: 320px; max-height: 320px; top: 40%; left: 50%; transform: translateX(-50%); background: rgba(130,100,200,0.06); animation-delay: 0.8s, 0.8s; filter: blur(120px); }
  @keyframes orbReveal {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes orbFloat {
    0%, 100% { transform: translate(0, 0); }
    33% { transform: translate(15px, -20px); }
    66% { transform: translate(-10px, 15px); }
  }
  .bg-grain {
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    opacity: 0.5;
  }
  .bg-line {
    position: absolute; background: linear-gradient(180deg, transparent, rgba(255,255,255,0.03), transparent); pointer-events: none;
  }
  .bg-line:nth-child(6) { width: 1px; top: 0; bottom: 0; left: 20%; }
  .bg-line:nth-child(7) { width: 1px; top: 0; bottom: 0; left: 50%; }
  .bg-line:nth-child(8) { width: 1px; top: 0; bottom: 0; left: 80%; }

  /* Header */
  .header { background: linear-gradient(180deg, #2a2c48 0%, var(--bg-secondary) 100%); border-bottom: 1px solid var(--border); padding: 20px 28px; display: flex; align-items: center; justify-content: space-between; position: relative; overflow: hidden; }
  .header::before { content: ''; position: absolute; top: -1px; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--accent), var(--blue), var(--pink), transparent); opacity: 0.8; }
  .header h1 { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 24px; font-weight: 600; color: var(--text-primary); letter-spacing: 0.04em; background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .view-toggle { display: flex; gap: 0; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .view-toggle button { border: none; background: transparent; padding: 7px 18px; cursor: pointer; font-size: 13px; font-weight: 400; color: var(--text-muted); transition: all 0.2s; letter-spacing: 0.03em; }
  .view-toggle button.active { background: var(--text-primary); color: var(--bg-primary); box-shadow: 0 0 12px rgba(255,255,255,0.1); }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .btn-add { background: transparent; color: var(--text-primary); border: 1px solid var(--border); padding: 7px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 400; display: flex; align-items: center; gap: 6px; transition: all 0.2s; letter-spacing: 0.03em; }
  .btn-add:hover { background: var(--accent); color: #111; border-color: var(--accent); box-shadow: 0 0 16px rgba(232,196,124,0.2); }

  /* Notification bell */
  .btn-bell { position: relative; border: none; background: transparent; cursor: pointer; font-size: 22px; padding: 4px 8px; border-radius: 8px; }
  .btn-bell:hover { background: var(--bg-hover); }
  .bell-count { position: absolute; top: -2px; right: 0; background: var(--red); color: #111; font-size: 10px; font-weight: 700; border-radius: 50%; min-width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; padding: 0 4px; }
  .bell-count.hidden { display: none; }

  /* Notification banner */
  .notif-banner { background: var(--bg-tertiary); border-bottom: 1px solid var(--border); padding: 10px 28px; display: none; align-items: center; gap: 12px; font-size: 13px; }
  .notif-banner.show { display: flex; }
  .notif-banner .notif-icon { font-size: 18px; }
  .notif-banner .notif-text { flex: 1; }
  .notif-banner .notif-text strong { color: var(--text-primary); }
  .notif-banner .notif-close { border: none; background: transparent; cursor: pointer; font-size: 18px; color: var(--text-muted); padding: 4px; }
  .notif-banner .notif-actions { display: flex; gap: 6px; }
  .notif-banner .notif-btn { border: 1px solid var(--border); background: transparent; color: var(--text-secondary); padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 400; letter-spacing: 0.03em; }
  .notif-banner .notif-btn:hover { border-color: var(--text-primary); color: var(--text-primary); }
  .notif-banner .notif-btn.primary { background: var(--red); color: #111; border-color: var(--red); font-weight: 600; }
  .notif-banner .notif-btn.primary:hover { background: #ff8787; }

  /* Notification permission bar */
  .perm-bar { background: var(--bg-tertiary); border-bottom: 1px solid var(--border); padding: 10px 28px; display: none; align-items: center; gap: 12px; font-size: 13px; }
  .perm-bar.show { display: flex; }
  .perm-bar .perm-text { flex: 1; color: var(--text-secondary); }
  .perm-bar button { border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 400; letter-spacing: 0.03em; }
  .perm-bar .perm-allow { background: var(--text-primary); color: var(--bg-primary); }
  .perm-bar .perm-allow:hover { background: #fff; }
  .perm-bar .perm-dismiss { background: transparent; color: var(--text-muted); }

  /* Filters */
  .filters { background: var(--bg-secondary); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .filter-group { display: flex; align-items: center; gap: 6px; }
  .filter-group label { font-size: 13px; color: var(--text-muted); font-weight: 500; }
  .filter-group select { border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: 13px; background: var(--bg-input); color: var(--text-primary); }

  /* Summary bar */
  .summary-bar { background: var(--bg-secondary); border-bottom: 1px solid var(--border); padding: 10px 24px; display: flex; gap: 20px; font-size: 13px; color: var(--text-secondary); }
  .summary-item { display: flex; align-items: center; gap: 6px; }
  .summary-dot { width: 8px; height: 8px; border-radius: 50%; }
  .summary-dot.overdue { background: var(--red); box-shadow: 0 0 6px rgba(255,107,107,0.4); }
  .summary-dot.today { background: var(--accent); box-shadow: 0 0 6px rgba(232,196,124,0.4); }
  .summary-dot.upcoming { background: var(--yellow); box-shadow: 0 0 6px rgba(255,169,77,0.4); }
  .summary-dot.done { background: var(--green); box-shadow: 0 0 6px rgba(81,207,102,0.4); }
  .summary-count { font-weight: 700; color: var(--text-primary); }

  /* Main */
  .main { padding: 24px; max-width: 1200px; margin: 0 auto; }

  /* Table View */
  .table-view table { width: 100%; border-collapse: collapse; background: rgba(38,40,64,0.8); backdrop-filter: blur(12px); border-radius: 8px; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 4px 24px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.04); }
  .table-view th { background: var(--bg-tertiary); padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 500; color: var(--text-muted); border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.08em; }
  .table-view td { padding: 12px 16px; border-bottom: 1px solid var(--border-light); font-size: 14px; vertical-align: middle; }
  .table-view tr:last-child td { border-bottom: none; }
  .table-view tr:hover td { background: rgba(255,255,255,0.03); }
  .table-view tr.row-done td { opacity: 0.45; text-decoration: line-through; text-decoration-color: var(--text-muted); }
  .table-view tr.row-done td .badge,
  .table-view tr.row-done td .cat-badge,
  .table-view tr.row-done td .action-btns { text-decoration: none; }
  .table-view tr.row-done:hover td { opacity: 0.7; }

  /* Status badges */
  .badge { display: inline-block; padding: 3px 10px; border-radius: 3px; font-size: 11px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }
  .badge-pending { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
  .badge-waiting { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(255,184,108,0.25); }
  .badge-progress { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(130,209,255,0.25); }
  .badge-done { background: var(--green-dim); color: var(--green); border: 1px solid rgba(99,230,160,0.2); }

  /* Category badges */
  .cat-badge { display: inline-block; padding: 3px 10px; border-radius: 3px; font-size: 11px; font-weight: 500; letter-spacing: 0.04em; }
  .cat-online { background: var(--blue-dim); color: var(--blue); }
  .cat-offline { background: var(--pink-dim); color: var(--pink); }
  .cat-payment { background: var(--accent-dim); color: var(--accent); }
  .cat-other { background: var(--green-dim); color: var(--green); }

  /* Deadline type badges */
  .deadline-badge { display: inline-block; padding: 3px 10px; border-radius: 3px; font-size: 11px; font-weight: 500; letter-spacing: 0.04em; }
  .deadline-none { background: transparent; color: var(--text-muted); border: 1px solid #2a2a2a; font-style: italic; }
  .deadline-range { background: var(--accent-dim); color: var(--accent); }

  .action-btns { display: flex; gap: 4px; }
  .action-btns button { border: none; background: transparent; cursor: pointer; padding: 4px 8px; border-radius: 4px; font-size: 18px; }
  .action-btns button:hover { background: var(--bg-hover); }

  /* Calendar View */
  .calendar-view { background: rgba(38,40,64,0.8); backdrop-filter: blur(12px); border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.04); overflow: hidden; border: 1px solid var(--border); }
  .cal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .cal-header h2 { font-size: 18px; font-weight: 600; }
  .cal-nav { display: flex; gap: 8px; }
  .cal-nav button { border: 1px solid var(--border); background: var(--bg-tertiary); color: var(--text-secondary); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 14px; }
  .cal-nav button:hover { background: var(--bg-hover); color: var(--text-primary); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
  .cal-day-header { padding: 10px; text-align: center; font-size: 13px; font-weight: 600; color: var(--text-muted); background: var(--bg-tertiary); border-bottom: 1px solid var(--border); }
  .cal-day-header:nth-child(1) { color: var(--text-secondary); }
  .cal-day-header:nth-child(7) { color: var(--text-secondary); }
  .cal-cell { min-height: 110px; border-right: 1px solid var(--border-light); border-bottom: 1px solid var(--border-light); padding: 6px; position: relative; }
  .cal-cell:nth-child(7n) { border-right: none; }
  .cal-cell.other-month { background: rgba(25,27,42,0.6); }
  .cal-cell.today { background: rgba(232,196,124,0.1); }
  .cal-date { font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 4px; }
  .cal-cell.other-month .cal-date { color: var(--text-muted); opacity: 0.4; }
  .cal-cell.today .cal-date { color: var(--accent); font-weight: 700; }
  .cal-cell .cal-date.sunday { color: var(--text-secondary); }
  .cal-cell .cal-date.saturday { color: var(--text-secondary); }
  .cal-task { padding: 3px 6px; margin-bottom: 2px; border-radius: 4px; font-size: 11px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
  .cal-task.cat-online { background: var(--blue-dim); color: var(--blue); }
  .cal-task.cat-offline { background: var(--pink-dim); color: var(--pink); }
  .cal-task.cat-payment { background: var(--accent-dim); color: var(--accent); }
  .cal-task.cat-other { background: var(--green-dim); color: var(--green); }
  .cal-task.status-done { opacity: 0.4; text-decoration: line-through; }
  .cal-more { font-size: 11px; color: var(--text-muted); padding: 2px 6px; cursor: pointer; border-radius: 3px; }
  .cal-more:hover { color: var(--accent); background: rgba(255,255,255,0.04); }

  /* Calendar day popover */
  .cal-popover-overlay { display: none; position: fixed; inset: 0; z-index: 90; }
  .cal-popover-overlay.show { display: block; }
  .cal-popover { position: fixed; z-index: 91; background: rgba(38,40,64,0.95); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 10px; padding: 14px; min-width: 240px; max-width: 320px; max-height: 360px; overflow-y: auto; box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
  .cal-popover .pop-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .cal-popover .pop-date { font-size: 14px; font-weight: 600; color: var(--text-primary); }
  .cal-popover .pop-close { border: none; background: transparent; color: var(--text-muted); font-size: 18px; cursor: pointer; padding: 0 4px; }
  .cal-popover .pop-close:hover { color: var(--text-primary); }
  .cal-popover .pop-task { padding: 6px 8px; margin-bottom: 4px; border-radius: 5px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .cal-popover .pop-task:hover { background: rgba(255,255,255,0.05); }
  .cal-popover .pop-task .pop-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .cal-popover .pop-task .pop-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cal-popover .pop-task.status-done .pop-text { text-decoration: line-through; opacity: 0.5; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: rgba(38,40,64,0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 28px; width: 460px; max-width: 95vw; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 80px rgba(232,196,124,0.04); }
  .modal h2 { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 20px; font-weight: 500; margin-bottom: 20px; letter-spacing: 0.03em; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 14px; background: var(--bg-input); color: var(--text-primary); }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232,196,124,0.12), 0 0 16px rgba(232,196,124,0.06); }
  .form-group textarea { resize: vertical; min-height: 60px; }
  .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .form-actions button { padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; }
  .btn-cancel { border: 1px solid var(--border); background: transparent; color: var(--text-muted); }
  .btn-cancel:hover { color: var(--text-primary); border-color: var(--text-muted); }
  .btn-save { border: none; background: var(--accent); color: #111; font-weight: 600; }
  .btn-save:hover { background: var(--accent-hover); box-shadow: 0 0 20px rgba(232,196,124,0.25); }
  .btn-delete { border: 1px solid var(--border); background: transparent; color: var(--text-muted); }
  .btn-delete:hover { background: var(--red-dim); color: var(--red); border-color: rgba(255,123,123,0.3); }

  /* Empty state */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; }

  /* Overdue highlight */
  .overdue { background: var(--red-dim) !important; }
  .overdue-text { color: var(--red); font-weight: 600; font-size: 12px; }

  /* Today marker */
  .due-today { color: var(--accent); font-weight: 600; font-size: 12px; }

  /* Toast notification */
  .toast-container { position: fixed; top: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
  .toast { background: rgba(38,40,64,0.92); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.3); padding: 14px 18px; display: flex; align-items: flex-start; gap: 10px; min-width: 300px; max-width: 400px; animation: slideIn 0.3s ease; border-left: 4px solid var(--accent); }
  .toast.warning { border-left-color: var(--yellow); }
  .toast.danger { border-left-color: var(--red); }
  .toast .toast-icon { font-size: 20px; flex-shrink: 0; }
  .toast .toast-body { flex: 1; }
  .toast .toast-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .toast .toast-msg { font-size: 13px; color: var(--text-muted); }
  .toast .toast-close { border: none; background: transparent; cursor: pointer; color: var(--text-muted); font-size: 16px; padding: 0 2px; }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }

  /* Progress bar (inline in table) */
  .mini-progress { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
  .mini-progress-bar { width: 60px; height: 4px; background: var(--bg-primary); border-radius: 2px; overflow: hidden; }
  .mini-progress-fill { height: 100%; border-radius: 2px; background: var(--text-muted); transition: width 0.3s, background 0.3s; }
  .mini-progress-text { font-size: 11px; color: var(--text-muted); }

  /* Inline expandable steps */
  .task-name { cursor: pointer; user-select: none; }
  .task-name:hover { color: #fff; }
  .task-name .expand-icon { font-size: 11px; color: var(--text-muted); margin-right: 4px; transition: transform 0.2s; display: inline-block; }
  .task-name .expand-icon.open { transform: rotate(90deg); color: var(--text-primary); }
  .inline-steps { padding: 8px 0 4px 0; }
  .inline-steps .inline-step { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 13px; }
  .inline-steps .inline-step input[type="checkbox"] { width: 15px; height: 15px; cursor: pointer; accent-color: var(--green); flex-shrink: 0; }
  .inline-steps .inline-step .step-label { flex: 1; color: var(--text-secondary); }
  .inline-steps .inline-step .step-label.done { text-decoration: line-through; color: var(--text-muted); }
  .inline-steps .inline-step .step-time { font-size: 11px; color: var(--text-muted); }
  .inline-steps .inline-step-del { border: none; background: transparent; cursor: pointer; color: var(--text-muted); font-size: 14px; padding: 0 2px; opacity: 0.5; }
  .inline-steps .inline-step-del:hover { color: var(--red); opacity: 1; }
  .inline-step-add { display: flex; gap: 4px; margin-top: 4px; }
  .inline-step-add input { flex: 1; border: 1px solid var(--border); border-radius: 5px; padding: 4px 8px; font-size: 12px; background: var(--bg-input); color: var(--text-primary); }
  .inline-step-add input:focus { outline: none; border-color: var(--accent); }
  .inline-step-add button { border: 1px solid var(--border); background: transparent; color: var(--text-secondary); padding: 4px 10px; border-radius: 5px; font-size: 12px; cursor: pointer; }
  .inline-step-add button:hover { background: var(--text-primary); color: var(--bg-primary); }

  /* Steps section in modal */
  .steps-section { margin-bottom: 16px; }
  .steps-section .section-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
  .progress-bar { width: 100%; height: 6px; background: var(--bg-primary); border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
  .progress-fill { height: 100%; border-radius: 3px; background: var(--text-muted); transition: width 0.3s, background 0.3s; }
  .step-list { list-style: none; margin: 0 0 8px 0; padding: 0; }
  .step-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border-light); }
  .step-item:last-child { border-bottom: none; }
  .step-item input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--green); flex-shrink: 0; }
  .step-item .step-text { flex: 1; font-size: 14px; color: var(--text-secondary); }
  .step-item .step-text.done { text-decoration: line-through; color: var(--text-muted); }
  .step-item .step-done-at { font-size: 11px; color: var(--text-muted); }
  .step-item .step-del { border: none; background: transparent; cursor: pointer; color: var(--text-muted); font-size: 16px; padding: 0 4px; opacity: 0.5; }
  .step-item .step-del:hover { color: var(--red); opacity: 1; }
  .step-add { display: flex; gap: 6px; }
  .step-add input { flex: 1; border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: 13px; background: var(--bg-input); color: var(--text-primary); }
  .step-add input:focus { outline: none; border-color: var(--accent); }
  .step-add button { border: 1px solid var(--border); background: transparent; color: var(--text-secondary); padding: 6px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; white-space: nowrap; }
  .step-add button:hover { background: var(--text-primary); color: var(--bg-primary); }

  /* History section in modal */
  .history-section { margin-bottom: 16px; }
  .history-section .section-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; }
  .history-list { max-height: 180px; overflow-y: auto; }
  .history-item { display: flex; gap: 10px; padding: 5px 0; font-size: 13px; border-left: 2px solid var(--border); padding-left: 12px; margin-left: 4px; }
  .history-item.type-status { border-left-color: var(--blue); }
  .history-item.type-step { border-left-color: var(--green); }
  .history-item.type-created { border-left-color: var(--accent); }
  .history-time { color: var(--text-muted); white-space: nowrap; font-size: 12px; min-width: 90px; }
  .history-content { color: var(--text-secondary); }
  .history-empty { color: var(--text-muted); font-size: 13px; font-style: italic; padding: 8px 0; }

  /* Calendar progress chip */
  .cal-progress { font-size: 9px; color: var(--green); font-weight: 600; margin-left: 2px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* Search box */
  .search-box { position: relative; }
  .search-box input { border: 1px solid var(--border); border-radius: 6px; padding: 7px 12px 7px 32px; font-size: 13px; background: var(--bg-input); color: var(--text-primary); width: 180px; transition: all 0.2s; }
  .search-box input:focus { outline: none; border-color: var(--accent); width: 220px; }
  .search-box input::placeholder { color: var(--text-muted); }
  .search-box::before { content: '🔍'; position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 12px; pointer-events: none; }
  .search-box .search-clear { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; padding: 0; display: none; }
  .search-box .search-clear.show { display: block; }

  /* Priority badges */
  .priority-badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 10px; font-weight: 600; letter-spacing: 0.04em; margin-right: 4px; }
  .priority-high { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,123,123,0.3); }
  .priority-medium { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(255,184,108,0.3); }
  .priority-low { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(130,209,255,0.3); }

  /* Tags */
  .tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 500; background: var(--bg-tertiary); color: var(--text-secondary); margin-right: 3px; margin-bottom: 2px; cursor: pointer; transition: all 0.15s; }
  .tag:hover { background: var(--accent-dim); color: var(--accent); }
  .tags-input { display: flex; flex-wrap: wrap; gap: 4px; padding: 8px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-input); min-height: 40px; align-items: center; }
  .tags-input input { border: none; background: transparent; color: var(--text-primary); font-size: 13px; flex: 1; min-width: 100px; outline: none; }
  .tags-input .tag { cursor: default; }
  .tags-input .tag .tag-remove { margin-left: 4px; cursor: pointer; opacity: 0.6; }
  .tags-input .tag .tag-remove:hover { opacity: 1; }

  /* Theme toggle */
  .btn-theme { border: none; background: transparent; cursor: pointer; font-size: 18px; padding: 4px 8px; border-radius: 8px; }
  .btn-theme:hover { background: var(--bg-hover); }

  /* Stats modal */
  .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 20px; }
  .stat-card { background: var(--bg-tertiary); border-radius: 10px; padding: 16px; text-align: center; }
  .stat-card .stat-value { font-size: 28px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
  .stat-card .stat-label { font-size: 12px; color: var(--text-muted); }
  .stat-bar { background: var(--bg-primary); border-radius: 4px; height: 8px; margin-top: 8px; overflow: hidden; }
  .stat-bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
  .stat-section { margin-bottom: 24px; }
  .stat-section h3 { font-size: 14px; font-weight: 600; color: var(--text-secondary); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .stat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 13px; }
  .stat-row .stat-row-label { flex: 1; color: var(--text-secondary); }
  .stat-row .stat-row-value { font-weight: 600; color: var(--text-primary); }
  .stat-row .stat-row-bar { flex: 2; height: 6px; background: var(--bg-primary); border-radius: 3px; overflow: hidden; }
  .stat-row .stat-row-bar-fill { height: 100%; border-radius: 3px; }

  /* Donut Chart */
  .donut-chart { position: relative; width: 140px; height: 140px; margin: 0 auto 16px; }
  .donut-chart svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .donut-chart circle { fill: none; stroke-width: 12; }
  .donut-chart .donut-bg { stroke: var(--bg-primary); }
  .donut-chart .donut-fill { stroke-linecap: round; transition: stroke-dasharray 0.8s ease; }
  .donut-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
  .donut-center .donut-value { font-size: 32px; font-weight: 700; color: var(--text-primary); line-height: 1; }
  .donut-center .donut-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

  /* Bar Chart */
  .bar-chart { display: flex; align-items: flex-end; justify-content: space-between; height: 120px; padding: 0 8px; gap: 8px; }
  .bar-chart-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar-chart-bar { width: 100%; max-width: 36px; border-radius: 4px 4px 0 0; transition: height 0.5s ease; position: relative; min-height: 4px; }
  .bar-chart-bar::after { content: attr(data-value); position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: 11px; font-weight: 600; color: var(--text-primary); }
  .bar-chart-label { font-size: 10px; color: var(--text-muted); text-align: center; }

  /* Pie Chart */
  .pie-chart { position: relative; width: 120px; height: 120px; margin: 0 auto; }
  .pie-chart svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .pie-legend { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 12px; }
  .pie-legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-secondary); }
  .pie-legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* Trend Line */
  .trend-chart { position: relative; height: 80px; margin-top: 8px; }
  .trend-chart svg { width: 100%; height: 100%; }
  .trend-line { fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .trend-area { opacity: 0.2; }
  .trend-dot { fill: var(--accent); }
  .trend-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-muted); margin-top: 4px; }

  /* Archive toggle */
  .archive-toggle { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-muted); cursor: pointer; }
  .archive-toggle input { accent-color: var(--accent); }
  .archive-toggle:hover { color: var(--text-primary); }
  .archived-badge { background: var(--bg-tertiary); color: var(--text-muted); font-size: 10px; padding: 2px 6px; border-radius: 3px; margin-left: 6px; }

  /* Drag and drop */
  .table-view tr.dragging { opacity: 0.5; background: var(--accent-dim); }
  .table-view tr.drag-over { border-top: 2px solid var(--accent); }
  .drag-handle { cursor: grab; padding: 0 4px; color: var(--text-muted); font-size: 14px; }
  .drag-handle:hover { color: var(--text-primary); }
  .drag-handle:active { cursor: grabbing; }

  /* Keyboard shortcuts help */
  .shortcuts-help { position: fixed; bottom: 20px; right: 20px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; font-size: 12px; color: var(--text-muted); z-index: 50; display: none; }
  .shortcuts-help.show { display: block; }
  .shortcuts-help kbd { background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 3px; padding: 2px 6px; font-family: monospace; margin-right: 8px; }

  /* Backup buttons */
  .btn-backup { border: 1px solid var(--border); background: transparent; color: var(--text-secondary); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 4px; }
  .btn-backup:hover { background: var(--bg-hover); color: var(--text-primary); }

  /* Import modal */
  .import-options { display: flex; flex-direction: column; gap: 10px; margin: 16px 0; }
  .import-option { display: flex; align-items: center; gap: 8px; padding: 12px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; }
  .import-option:hover { border-color: var(--accent); background: var(--accent-dim); }
  .import-option input[type="radio"] { accent-color: var(--accent); }

  /* Responsive */
  @media (max-width: 768px) {
    .header { flex-direction: column; gap: 12px; }
    .filters { flex-direction: column; align-items: flex-start; }
    .cal-cell { min-height: 80px; }
    .cal-task { font-size: 10px; }
    .summary-bar { flex-wrap: wrap; gap: 10px; }
    .search-box input { width: 140px; }
    .search-box input:focus { width: 160px; }
    .stats-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- Background -->
<div class="bg-layer">
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-line"></div>
  <div class="bg-line"></div>
  <div class="bg-line"></div>
  <div class="bg-grain"></div>
</div>

<!-- Notification permission bar -->
<div class="perm-bar" id="permBar">
  <span style="font-size:20px;">&#128276;</span>
  <span class="perm-text">브라우저 알림을 허용하면 마감 임박/지난 할일을 놓치지 않을 수 있어요.</span>
  <button class="perm-allow" onclick="requestNotifPermission()">알림 허용</button>
  <button class="perm-dismiss" onclick="dismissPermBar()">나중에</button>
</div>

<!-- Notification banner -->
<div class="notif-banner" id="notifBanner">
  <span class="notif-icon">&#9888;&#65039;</span>
  <span class="notif-text" id="notifText"></span>
  <div class="notif-actions">
    <button class="notif-btn primary" onclick="setView('table');document.getElementById('filterStatus').value='all';render();closeNotifBanner();">확인하기</button>
    <button class="notif-btn" onclick="closeNotifBanner()">닫기</button>
  </div>
</div>

<div class="header">
  <h1>수업 관리 대시보드</h1>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="검색... (/ 키)" oninput="handleSearch()" onkeydown="if(event.key==='Escape'){this.value='';handleSearch();}">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">&times;</button>
  </div>
  <div class="view-toggle">
    <button class="active" onclick="setView('table')">목록</button>
    <button onclick="setView('calendar')">캘린더</button>
  </div>
  <div class="header-actions">
    <button class="btn-theme" id="themeToggle" onclick="toggleTheme()" title="테마 전환">🌙</button>
    <button class="btn-backup" onclick="openStatsModal()" title="통계">📊 통계</button>
    <button class="btn-backup" onclick="exportData()" title="내보내기">⬇️</button>
    <button class="btn-backup" onclick="document.getElementById('importFile').click()" title="가져오기">⬆️</button>
    <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importData(event)">
    <button class="btn-bell" onclick="checkAndNotify(true)" title="알림 확인">
      &#128276;
      <span class="bell-count hidden" id="bellCount">0</span>
    </button>
    <button class="btn-add" onclick="openModal()">+ 새 할일</button>
  </div>
</div>

<!-- Summary bar -->
<div class="summary-bar" id="summaryBar">
  <div class="summary-item"><span class="summary-dot overdue"></span> 지연: <span class="summary-count" id="sumOverdue">0</span></div>
  <div class="summary-item"><span class="summary-dot today"></span> 오늘 마감: <span class="summary-count" id="sumToday">0</span></div>
  <div class="summary-item"><span class="summary-dot upcoming"></span> 이번 주: <span class="summary-count" id="sumWeek">0</span></div>
  <div class="summary-item"><span class="summary-dot done"></span> 완료: <span class="summary-count" id="sumDone">0</span></div>
  <div class="summary-item"><span class="summary-dot" style="background:var(--text-muted);"></span> 미정: <span class="summary-count" id="sumNoDate">0</span></div>
</div>

<div class="filters">
  <div class="filter-group">
    <label>카테고리:</label>
    <select id="filterCat" onchange="render()">
      <option value="all">전체</option>
      <option value="online">온라인 수업</option>
      <option value="offline">대면 수업</option>
      <option value="payment">수업비</option>
      <option value="other">기타</option>
    </select>
  </div>
  <div class="filter-group">
    <label>상태:</label>
    <select id="filterStatus" onchange="render()">
      <option value="all">전체</option>
      <option value="pending">미시작</option>
      <option value="progress">진행중</option>
      <option value="waiting">대기</option>
      <option value="done">완료</option>
    </select>
  </div>
  <div class="filter-group">
    <label>우선순위:</label>
    <select id="filterPriority" onchange="render()">
      <option value="all">전체</option>
      <option value="high">높음</option>
      <option value="medium">중간</option>
      <option value="low">낮음</option>
      <option value="none">없음</option>
    </select>
  </div>
  <div class="filter-group">
    <label>태그:</label>
    <select id="filterTag" onchange="render()">
      <option value="all">전체</option>
    </select>
  </div>
  <div class="filter-group">
    <label>정렬:</label>
    <select id="sortBy" onchange="render()">
      <option value="dueDate">마감일순</option>
      <option value="createdAt">추가일순</option>
      <option value="status">상태순</option>
      <option value="priority">우선순위순</option>
      <option value="category">카테고리순</option>
    </select>
  </div>
  <label class="archive-toggle">
    <input type="checkbox" id="showArchived" onchange="render()">
    보관함 보기
  </label>
</div>

<div class="main">
  <div id="tableView" class="table-view"></div>
  <div id="calendarView" class="calendar-view" style="display:none;"></div>
</div>

<!-- Calendar day popover -->
<div class="cal-popover-overlay" id="calPopoverOverlay" onclick="closeCalPopover()"></div>
<div class="cal-popover" id="calPopover" style="display:none;"></div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Stats Modal -->
<div class="modal-overlay" id="statsModal">
  <div class="modal" style="width:560px;max-width:95vw;">
    <h2>📊 통계 대시보드</h2>
    <div id="statsContent"></div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeStatsModal()">닫기</button>
    </div>
  </div>
</div>

<!-- Import Modal -->
<div class="modal-overlay" id="importModal">
  <div class="modal" style="width:400px;">
    <h2>📥 데이터 가져오기</h2>
    <p style="font-size:13px;color:var(--text-secondary);margin-bottom:16px;">가져온 파일에 <strong id="importCount">0</strong>개의 작업이 있습니다.</p>
    <div class="import-options">
      <label class="import-option">
        <input type="radio" name="importMode" value="merge" checked>
        <div>
          <div style="font-weight:600;">병합하기</div>
          <div style="font-size:12px;color:var(--text-muted);">기존 데이터와 합칩니다 (중복 제외)</div>
        </div>
      </label>
      <label class="import-option">
        <input type="radio" name="importMode" value="replace">
        <div>
          <div style="font-weight:600;">교체하기</div>
          <div style="font-size:12px;color:var(--text-muted);">기존 데이터를 삭제하고 새로 가져옵니다</div>
        </div>
      </label>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeImportModal()">취소</button>
      <button class="btn-save" onclick="confirmImport()">가져오기</button>
    </div>
  </div>
</div>

<!-- Keyboard shortcuts help -->
<div class="shortcuts-help" id="shortcutsHelp">
  <div style="font-weight:600;margin-bottom:8px;">⌨️ 단축키</div>
  <div><kbd>N</kbd> 새 할일</div>
  <div><kbd>/</kbd> 검색</div>
  <div><kbd>1</kbd> 목록 뷰</div>
  <div><kbd>2</kbd> 캘린더 뷰</div>
  <div><kbd>?</kbd> 도움말 토글</div>
  <div><kbd>Esc</kbd> 닫기</div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modalTitle">새 할일 추가</h2>
    <input type="hidden" id="editId">
    <div class="form-group">
      <label>학생 / 대상</label>
      <input type="text" id="fStudent" placeholder="예: 김민수, 전체, -">
    </div>
    <div class="form-group">
      <label>할 일</label>
      <input type="text" id="fTask" placeholder="예: 스케쥴 컨펌">
    </div>
    <div class="form-group">
      <label>카테고리</label>
      <select id="fCategory">
        <option value="online">온라인 수업</option>
        <option value="offline">대면 수업</option>
        <option value="payment">수업비</option>
        <option value="other">기타</option>
      </select>
    </div>
    <div class="form-group">
      <label>마감일 설정</label>
      <select id="fDeadlineType" onchange="toggleDeadlineInputs()">
        <option value="date">날짜 지정</option>
        <option value="range">기간 지정</option>
        <option value="none">미정</option>
      </select>
    </div>
    <div class="form-group" id="fDueDateGroup">
      <label>마감일</label>
      <input type="date" id="fDueDate">
    </div>
    <div class="form-group" id="fRangeGroup" style="display:none;">
      <label>기간</label>
      <select id="fRange">
        <option value="this_week">이번 주 내</option>
        <option value="next_week">다음 주 내</option>
        <option value="this_month">이번 달 내</option>
        <option value="next_month">다음 달 내</option>
      </select>
    </div>
    <div class="form-group">
      <label>우선순위</label>
      <select id="fPriority">
        <option value="none">없음</option>
        <option value="low">낮음</option>
        <option value="medium">중간</option>
        <option value="high">높음</option>
      </select>
    </div>
    <div class="form-group">
      <label>상태</label>
      <select id="fStatus">
        <option value="pending">미시작</option>
        <option value="progress">진행중</option>
        <option value="waiting">대기</option>
        <option value="done">완료</option>
      </select>
    </div>
    <div class="form-group">
      <label>태그 <span style="font-weight:400;color:var(--text-muted);">(쉼표 또는 Enter로 구분)</span></label>
      <div class="tags-input" id="tagsInput" onclick="document.getElementById('tagInputField').focus()">
        <input type="text" id="tagInputField" placeholder="태그 입력..." onkeydown="handleTagInput(event)">
      </div>
    </div>
    <div class="form-group">
      <label>메모</label>
      <textarea id="fMemo" placeholder="추가 메모 (선택)"></textarea>
    </div>

    <!-- Steps section (only visible when editing) -->
    <div class="steps-section" id="stepsSection" style="display:none;">
      <div class="section-title">
        <span>단계 체크리스트</span>
        <span id="stepsCount" style="font-weight:400;font-size:12px;color:var(--text-muted);"></span>
      </div>
      <div class="progress-bar" id="stepsProgressBar"><div class="progress-fill" id="stepsProgressFill" style="width:0%;"></div></div>
      <ul class="step-list" id="stepList"></ul>
      <div class="step-add">
        <input type="text" id="stepInput" placeholder="새 단계 입력 후 Enter 또는 추가 클릭" onkeydown="if(event.key==='Enter'){event.preventDefault();addStep();}">
        <button onclick="addStep()">추가</button>
      </div>
    </div>

    <!-- History section (only visible when editing) -->
    <div class="history-section" id="historySection" style="display:none;">
      <div class="section-title">히스토리</div>
      <div class="history-list" id="historyList"></div>
    </div>

    <div class="form-actions">
      <button class="btn-delete" id="btnDelete" style="display:none;" onclick="deleteTask()">삭제</button>
      <div style="flex:1;"></div>
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveTask()">저장</button>
    </div>
  </div>
</div>

<script>
// ===== Data =====
const STORAGE_KEY = 'task-manager-data';
const NOTIF_KEY = 'task-manager-notified';
const THEME_KEY = 'task-manager-theme';
let tasks = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let currentView = 'table';
let calYear, calMonth;
const expandedTasks = new Set();
let searchQuery = '';
let pendingImportData = null;
let currentTags = []; // For modal tag input
let draggedRow = null;

// Priority order for sorting
const priorityOrder = { high: 0, medium: 1, low: 2, none: 3 };
const priorityLabels = { high: '높음', medium: '중간', low: '낮음', none: '없음' };

const now = new Date();
calYear = now.getFullYear();
calMonth = now.getMonth();

const catLabels = { online: '온라인 수업', offline: '대면 수업', payment: '수업비', other: '기타' };
const catClasses = { online: 'cat-online', offline: 'cat-offline', payment: 'cat-payment', other: 'cat-other' };
const statusLabels = { pending: '미시작', progress: '진행중', waiting: '대기', done: '완료' };
const statusClasses = { pending: 'badge-pending', progress: 'badge-progress', waiting: 'badge-waiting', done: 'badge-done' };
const statusOrder = { pending: 0, progress: 1, waiting: 2, done: 3 };

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); }

// ===== Search =====
function handleSearch() {
  searchQuery = document.getElementById('searchInput').value.trim();
  document.getElementById('searchClear').classList.toggle('show', searchQuery.length > 0);
  render();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  searchQuery = '';
  document.getElementById('searchClear').classList.remove('show');
  render();
}

// ===== Theme =====
function initTheme() {
  const saved = localStorage.getItem(THEME_KEY);
  if (saved) {
    document.documentElement.setAttribute('data-theme', saved);
    updateThemeButton(saved);
  } else {
    // Check system preference
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
      document.documentElement.setAttribute('data-theme', 'light');
      updateThemeButton('light');
    }
  }
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const newTheme = current === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', newTheme === 'dark' ? '' : newTheme);
  localStorage.setItem(THEME_KEY, newTheme);
  updateThemeButton(newTheme);
}

function updateThemeButton(theme) {
  document.getElementById('themeToggle').textContent = theme === 'light' ? '☀️' : '🌙';
}

// ===== Backup: Export =====
function exportData() {
  const data = {
    version: 1,
    exportedAt: new Date().toISOString(),
    tasks: tasks
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `task-manager-backup-${todayStr()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('백업 완료', '데이터가 다운로드되었습니다.', 'info');
}

// ===== Backup: Import =====
function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.tasks && Array.isArray(data.tasks)) {
        pendingImportData = data.tasks;
        document.getElementById('importCount').textContent = data.tasks.length;
        document.getElementById('importModal').classList.add('show');
      } else if (Array.isArray(data)) {
        pendingImportData = data;
        document.getElementById('importCount').textContent = data.length;
        document.getElementById('importModal').classList.add('show');
      } else {
        throw new Error('Invalid format');
      }
    } catch (err) {
      showToast('가져오기 실패', '올바른 JSON 파일이 아닙니다.', 'danger');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function closeImportModal() {
  document.getElementById('importModal').classList.remove('show');
  pendingImportData = null;
}

function confirmImport() {
  if (!pendingImportData) return;
  const mode = document.querySelector('input[name="importMode"]:checked').value;
  if (mode === 'replace') {
    tasks = pendingImportData;
  } else {
    // Merge: add tasks that don't exist
    const existingIds = new Set(tasks.map(t => t.id));
    pendingImportData.forEach(t => {
      if (!existingIds.has(t.id)) {
        tasks.push(t);
      }
    });
  }
  save();
  closeImportModal();
  render();
  updateTagFilter();
  showToast('가져오기 완료', `${pendingImportData.length}개의 작업을 ${mode === 'replace' ? '교체' : '병합'}했습니다.`, 'info');
}

// ===== Stats =====
function openStatsModal() {
  renderStats();
  document.getElementById('statsModal').classList.add('show');
}

function closeStatsModal() {
  document.getElementById('statsModal').classList.remove('show');
}

function renderStats() {
  const total = tasks.filter(t => !t.archived).length;
  const done = tasks.filter(t => !t.archived && t.status === 'done').length;
  const inProgress = tasks.filter(t => !t.archived && t.status === 'progress').length;
  const pending = tasks.filter(t => !t.archived && t.status === 'pending').length;
  const waiting = tasks.filter(t => !t.archived && t.status === 'waiting').length;
  const archived = tasks.filter(t => t.archived).length;
  const today = todayStr();
  const overdue = tasks.filter(t => !t.archived && t.status !== 'done' && getEffectiveDueDate(t) && getEffectiveDueDate(t) < today).length;

  // Last 7 days completion data
  const last7Days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const dayNames = ['일','월','화','수','목','금','토'];
    last7Days.push({ date: ds, label: dayNames[d.getDay()], count: 0 });
  }
  tasks.forEach(t => {
    if (t.status === 'done' && t.history) {
      const doneEntry = [...t.history].reverse().find(h => h.type === 'status' && h.to === '완료');
      if (doneEntry) {
        const doneDate = doneEntry.at.slice(0, 10);
        const dayData = last7Days.find(d => d.date === doneDate);
        if (dayData) dayData.count++;
      }
    }
  });
  const maxDayCount = Math.max(...last7Days.map(d => d.count), 1);

  // This week completed
  const weekDone = last7Days.reduce((sum, d) => sum + d.count, 0);

  // Category distribution
  const catDist = { online: 0, offline: 0, payment: 0, other: 0 };
  const catColors = { online: '#82d1ff', offline: '#ee9cff', payment: '#e8c47c', other: '#63e6a0' };
  tasks.filter(t => !t.archived).forEach(t => {
    catDist[t.category] = (catDist[t.category] || 0) + 1;
  });

  // Priority distribution
  const priDist = { high: 0, medium: 0, low: 0, none: 0 };
  tasks.filter(t => !t.archived && t.status !== 'done').forEach(t => {
    const p = t.priority || 'none';
    priDist[p] = (priDist[p] || 0) + 1;
  });

  const completionRate = total > 0 ? Math.round((done / total) * 100) : 0;

  // Generate donut chart
  const donutRadius = 54;
  const donutCircumference = 2 * Math.PI * donutRadius;
  const donutFill = (completionRate / 100) * donutCircumference;

  // Generate pie chart for categories
  let pieSegments = '';
  let pieOffset = 0;
  const pieRadius = 50;
  const pieCircumference = 2 * Math.PI * pieRadius;
  const catEntries = Object.entries(catDist).filter(([_, count]) => count > 0);
  catEntries.forEach(([cat, count]) => {
    const pct = total > 0 ? count / total : 0;
    const segmentLength = pct * pieCircumference;
    pieSegments += `<circle cx="60" cy="60" r="${pieRadius}" stroke="${catColors[cat]}" stroke-width="20" stroke-dasharray="${segmentLength} ${pieCircumference}" stroke-dashoffset="${-pieOffset}" fill="none"/>`;
    pieOffset += segmentLength;
  });

  // Generate trend line SVG
  const trendWidth = 460;
  const trendHeight = 70;
  const trendPadding = 20;
  const trendPoints = last7Days.map((d, i) => {
    const x = trendPadding + (i / 6) * (trendWidth - 2 * trendPadding);
    const y = trendHeight - trendPadding - (d.count / maxDayCount) * (trendHeight - 2 * trendPadding);
    return { x, y, count: d.count };
  });
  const trendLinePath = trendPoints.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
  const trendAreaPath = `${trendLinePath} L ${trendPoints[6].x} ${trendHeight - trendPadding} L ${trendPoints[0].x} ${trendHeight - trendPadding} Z`;

  let html = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;">
      <div style="text-align:center;">
        <div class="donut-chart">
          <svg viewBox="0 0 140 140">
            <circle class="donut-bg" cx="70" cy="70" r="${donutRadius}"/>
            <circle class="donut-fill" cx="70" cy="70" r="${donutRadius}" stroke="var(--green)" stroke-dasharray="${donutFill} ${donutCircumference}"/>
          </svg>
          <div class="donut-center">
            <div class="donut-value">${completionRate}%</div>
            <div class="donut-label">완료율</div>
          </div>
        </div>
        <div style="font-size:12px;color:var(--text-muted);">${done}/${total} 완료</div>
      </div>
      <div style="text-align:center;">
        <div class="pie-chart">
          <svg viewBox="0 0 120 120">
            ${pieSegments || '<circle cx="60" cy="60" r="50" stroke="var(--bg-primary)" stroke-width="20" fill="none"/>'}
          </svg>
        </div>
        <div class="pie-legend">
          ${Object.entries(catDist).map(([cat, count]) => `
            <div class="pie-legend-item">
              <span class="pie-legend-dot" style="background:${catColors[cat]}"></span>
              ${catLabels[cat]} (${count})
            </div>
          `).join('')}
        </div>
      </div>
    </div>

    <div class="stats-grid" style="margin-bottom:24px;">
      <div class="stat-card">
        <div class="stat-value" style="color:var(--red);">${overdue}</div>
        <div class="stat-label">지연</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color:var(--blue);">${inProgress}</div>
        <div class="stat-label">진행중</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color:var(--yellow);">${waiting}</div>
        <div class="stat-label">대기</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${pending}</div>
        <div class="stat-label">미시작</div>
      </div>
    </div>

    <div class="stat-section">
      <h3>📈 최근 7일 완료 추이</h3>
      <div class="trend-chart">
        <svg viewBox="0 0 ${trendWidth} ${trendHeight}" preserveAspectRatio="none">
          <path class="trend-area" d="${trendAreaPath}" fill="var(--accent)"/>
          <path class="trend-line" d="${trendLinePath}" stroke="var(--accent)"/>
          ${trendPoints.map(p => `<circle class="trend-dot" cx="${p.x}" cy="${p.y}" r="4"/>`).join('')}
        </svg>
      </div>
      <div class="trend-labels">
        ${last7Days.map(d => `<span>${d.label}</span>`).join('')}
      </div>
      <div style="text-align:center;margin-top:8px;font-size:13px;color:var(--accent);font-weight:600;">이번 주 ${weekDone}개 완료!</div>
    </div>

    <div class="stat-section">
      <h3>📊 일별 완료 현황</h3>
      <div class="bar-chart">
        ${last7Days.map(d => {
          const height = maxDayCount > 0 ? (d.count / maxDayCount) * 80 : 0;
          const isToday = d.date === today;
          return `
            <div class="bar-chart-item">
              <div class="bar-chart-bar" style="height:${Math.max(height, 4)}px;background:${isToday ? 'var(--accent)' : 'var(--blue)'};" data-value="${d.count}"></div>
              <div class="bar-chart-label" style="${isToday ? 'color:var(--accent);font-weight:600;' : ''}">${d.label}</div>
            </div>
          `;
        }).join('')}
      </div>
    </div>

    <div class="stat-section">
      <h3>🎯 우선순위별 미완료</h3>
      ${Object.entries(priDist).map(([pri, count]) => {
        const remaining = total - done;
        const colors = { high: 'var(--red)', medium: 'var(--yellow)', low: 'var(--blue)', none: 'var(--text-muted)' };
        return `
          <div class="stat-row">
            <span class="stat-row-label">${priorityLabels[pri]}</span>
            <div class="stat-row-bar"><div class="stat-row-bar-fill" style="width:${remaining > 0 ? (count/remaining*100) : 0}%;background:${colors[pri]};"></div></div>
            <span class="stat-row-value">${count}</span>
          </div>
        `;
      }).join('')}
    </div>

    <div style="font-size:12px;color:var(--text-muted);text-align:center;padding-top:8px;border-top:1px solid var(--border);">📦 보관된 작업: ${archived}개</div>
  `;
  document.getElementById('statsContent').innerHTML = html;
}

// ===== Tags Input =====
function handleTagInput(event) {
  const input = event.target;
  if (event.key === 'Enter' || event.key === ',') {
    event.preventDefault();
    const text = input.value.replace(',', '').trim();
    if (text && !currentTags.includes(text)) {
      currentTags.push(text);
      renderTagsInput();
    }
    input.value = '';
  } else if (event.key === 'Backspace' && input.value === '' && currentTags.length > 0) {
    currentTags.pop();
    renderTagsInput();
  }
}

function renderTagsInput() {
  const container = document.getElementById('tagsInput');
  const input = document.getElementById('tagInputField');
  container.innerHTML = '';
  currentTags.forEach((tag, i) => {
    const span = document.createElement('span');
    span.className = 'tag';
    span.innerHTML = `#${esc(tag)}<span class="tag-remove" onclick="removeTag(${i})">&times;</span>`;
    container.appendChild(span);
  });
  container.appendChild(input);
}

function removeTag(index) {
  currentTags.splice(index, 1);
  renderTagsInput();
}

// ===== Archive =====
function archiveTask(id) {
  const t = tasks.find(x => x.id === id);
  if (t) {
    t.archived = true;
    t.archivedAt = nowTimestamp();
    save(); render();
    showToast('보관됨', '작업이 보관함으로 이동되었습니다.', 'info');
  }
}

function restoreTask(id) {
  const t = tasks.find(x => x.id === id);
  if (t) {
    t.archived = false;
    delete t.archivedAt;
    save(); render();
    showToast('복원됨', '작업이 복원되었습니다.', 'info');
  }
}

// Auto-archive completed tasks older than 7 days
function autoArchive() {
  const sevenDaysAgo = new Date();
  sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
  const threshold = `${sevenDaysAgo.getFullYear()}-${String(sevenDaysAgo.getMonth()+1).padStart(2,'0')}-${String(sevenDaysAgo.getDate()).padStart(2,'0')}`;
  let changed = false;
  tasks.forEach(t => {
    if (t.status === 'done' && !t.archived && t.history) {
      const doneEntry = [...t.history].reverse().find(h => h.type === 'status' && h.to === '완료');
      if (doneEntry && doneEntry.at.slice(0, 10) < threshold) {
        t.archived = true;
        t.archivedAt = nowTimestamp();
        changed = true;
      }
    }
  });
  if (changed) save();
}

// ===== Keyboard Shortcuts =====
function initKeyboardShortcuts() {
  document.addEventListener('keydown', e => {
    // Ignore if typing in input/textarea
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') {
      return;
    }
    // Ignore if modal is open (except Escape)
    const modalOpen = document.getElementById('modal').classList.contains('show') ||
                      document.getElementById('statsModal').classList.contains('show') ||
                      document.getElementById('importModal').classList.contains('show');

    if (e.key === 'Escape') {
      closeModal();
      closeStatsModal();
      closeImportModal();
      document.getElementById('shortcutsHelp').classList.remove('show');
      return;
    }

    if (modalOpen) return;

    switch(e.key) {
      case 'n':
      case 'N':
        e.preventDefault();
        openModal();
        break;
      case '/':
        e.preventDefault();
        document.getElementById('searchInput').focus();
        break;
      case '1':
        setView('table');
        break;
      case '2':
        setView('calendar');
        break;
      case '?':
        document.getElementById('shortcutsHelp').classList.toggle('show');
        break;
    }
  });
}

// ===== Drag and Drop =====
function initDragAndDrop() {
  // Will be called after renderTable to attach handlers
}

function handleDragStart(e, taskId) {
  draggedRow = taskId;
  e.target.closest('tr').classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function handleDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const tr = e.target.closest('tr');
  if (tr && !tr.classList.contains('dragging')) {
    document.querySelectorAll('.table-view tr').forEach(r => r.classList.remove('drag-over'));
    tr.classList.add('drag-over');
  }
}

function handleDragEnd(e) {
  e.target.closest('tr')?.classList.remove('dragging');
  document.querySelectorAll('.table-view tr').forEach(r => r.classList.remove('drag-over'));
}

function handleDrop(e, targetId) {
  e.preventDefault();
  if (!draggedRow || draggedRow === targetId) return;

  const filtered = getFiltered();
  const draggedIndex = filtered.findIndex(t => t.id === draggedRow);
  const targetIndex = filtered.findIndex(t => t.id === targetId);

  if (draggedIndex < 0 || targetIndex < 0) return;

  // Update order values for all tasks
  filtered.forEach((t, i) => {
    const task = tasks.find(x => x.id === t.id);
    if (task) task.order = i;
  });

  // Swap orders
  const draggedTask = tasks.find(t => t.id === draggedRow);
  const targetTask = tasks.find(t => t.id === targetId);
  if (draggedTask && targetTask) {
    const tempOrder = draggedTask.order;
    draggedTask.order = targetTask.order;
    targetTask.order = tempOrder;
  }

  draggedRow = null;
  save();
  render();
}

function nowTimestamp() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function addHistory(task, entry) {
  if (!task.history) task.history = [];
  entry.at = nowTimestamp();
  task.history.push(entry);
}

function getStepsDone(t) {
  if (!t.steps || t.steps.length === 0) return null;
  const done = t.steps.filter(s => s.done).length;
  return { done, total: t.steps.length };
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function endOfWeekStr() {
  const d = new Date();
  d.setDate(d.getDate() + (7 - d.getDay()));
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getFiltered() {
  const cat = document.getElementById('filterCat').value;
  const status = document.getElementById('filterStatus').value;
  const priority = document.getElementById('filterPriority').value;
  const tag = document.getElementById('filterTag').value;
  const showArchived = document.getElementById('showArchived').checked;

  let filtered = tasks.filter(t => {
    // Archive filter
    if (showArchived) {
      if (!t.archived) return false;
    } else {
      if (t.archived) return false;
    }
    // Category filter
    if (cat !== 'all' && t.category !== cat) return false;
    // Status filter
    if (status !== 'all' && t.status !== status) return false;
    // Priority filter
    if (priority !== 'all' && (t.priority || 'none') !== priority) return false;
    // Tag filter
    if (tag !== 'all') {
      if (!t.tags || !t.tags.includes(tag)) return false;
    }
    // Search filter
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const searchText = `${t.student || ''} ${t.task || ''} ${t.memo || ''} ${(t.tags || []).join(' ')}`.toLowerCase();
      if (!searchText.includes(q)) return false;
    }
    return true;
  });

  const sortBy = document.getElementById('sortBy').value;
  filtered.sort((a, b) => {
    // If tasks have order property, use it first
    if (a.order !== undefined && b.order !== undefined) {
      if (sortBy === 'dueDate' || sortBy === 'createdAt') {
        // For these sorts, ignore manual order
      } else if (a.order !== b.order) {
        return a.order - b.order;
      }
    }
    if (sortBy === 'dueDate') return (getEffectiveDueDate(a) || '9999') < (getEffectiveDueDate(b) || '9999') ? -1 : 1;
    if (sortBy === 'createdAt') return (b.createdAt || '').localeCompare(a.createdAt || '');
    if (sortBy === 'status') return (statusOrder[a.status] ?? 9) - (statusOrder[b.status] ?? 9);
    if (sortBy === 'priority') return (priorityOrder[a.priority] ?? 3) - (priorityOrder[b.priority] ?? 3);
    if (sortBy === 'category') return (a.category || '').localeCompare(b.category || '');
    return 0;
  });
  return filtered;
}

// Update tag filter dropdown
function updateTagFilter() {
  const select = document.getElementById('filterTag');
  const currentValue = select.value;
  const allTags = new Set();
  tasks.forEach(t => {
    if (t.tags) t.tags.forEach(tag => allTags.add(tag));
  });
  select.innerHTML = '<option value="all">전체</option>';
  Array.from(allTags).sort().forEach(tag => {
    select.innerHTML += `<option value="${esc(tag)}">${esc(tag)}</option>`;
  });
  select.value = allTags.has(currentValue) ? currentValue : 'all';
}

const rangeLabels = { this_week: '이번 주 내', next_week: '다음 주 내', this_month: '이번 달 내', next_month: '다음 달 내' };

function rangeToEndDate(range) {
  const d = new Date();
  if (range === 'this_week') { d.setDate(d.getDate() + (7 - d.getDay())); }
  else if (range === 'next_week') { d.setDate(d.getDate() + (14 - d.getDay())); }
  else if (range === 'this_month') { d.setMonth(d.getMonth() + 1, 0); }
  else if (range === 'next_month') { d.setMonth(d.getMonth() + 2, 0); }
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getEffectiveDueDate(t) {
  if (t.deadlineType === 'range' && t.range) return rangeToEndDate(t.range);
  if (t.deadlineType === 'none') return null;
  return t.dueDate || null;
}

function dueDateDisplay(d, t) {
  if (t && t.deadlineType === 'none') return '<span class="deadline-badge deadline-none">미정</span>';
  if (t && t.deadlineType === 'range' && t.range) {
    const endDate = rangeToEndDate(t.range);
    const today = todayStr();
    const label = rangeLabels[t.range] || t.range;
    if (endDate < today) return `<span class="deadline-badge deadline-range">${label}</span> <span class="overdue-text">(지남)</span>`;
    return `<span class="deadline-badge deadline-range">${label}</span> <span style="font-size:11px;color:var(--text-muted);">~${endDate}</span>`;
  }
  if (!d) return '<span class="deadline-badge deadline-none">미정</span>';
  const today = todayStr();
  if (d < today) return `<span class="overdue-text">${d} (지남)</span>`;
  if (d === today) return `<span class="due-today">${d} (오늘)</span>`;
  const tom = new Date(); tom.setDate(tom.getDate()+1);
  const tomStr = `${tom.getFullYear()}-${String(tom.getMonth()+1).padStart(2,'0')}-${String(tom.getDate()).padStart(2,'0')}`;
  if (d === tomStr) return `<span style="color:var(--yellow);font-weight:600;font-size:12px;">${d} (내일)</span>`;
  return d;
}

function toggleDeadlineInputs() {
  const type = document.getElementById('fDeadlineType').value;
  document.getElementById('fDueDateGroup').style.display = type === 'date' ? '' : 'none';
  document.getElementById('fRangeGroup').style.display = type === 'range' ? '' : 'none';
}

// ===== Summary Bar =====
function updateSummary() {
  const today = todayStr();
  const weekEnd = endOfWeekStr();
  let overdue = 0, todayCount = 0, weekCount = 0, doneCount = 0, noDateCount = 0;
  tasks.forEach(t => {
    if (t.status === 'done') { doneCount++; return; }
    const eff = getEffectiveDueDate(t);
    if (!eff) { noDateCount++; return; }
    if (eff < today) overdue++;
    else if (eff === today) todayCount++;
    else if (eff <= weekEnd) weekCount++;
  });
  document.getElementById('sumOverdue').textContent = overdue;
  document.getElementById('sumToday').textContent = todayCount;
  document.getElementById('sumWeek').textContent = weekCount;
  document.getElementById('sumDone').textContent = doneCount;
  document.getElementById('sumNoDate').textContent = noDateCount;

  // Bell count
  const urgent = overdue + todayCount;
  const bellEl = document.getElementById('bellCount');
  if (urgent > 0) {
    bellEl.textContent = urgent;
    bellEl.classList.remove('hidden');
  } else {
    bellEl.classList.add('hidden');
  }
}

// ===== Notifications =====
function requestNotifPermission() {
  if ('Notification' in window) {
    Notification.requestPermission().then(perm => {
      document.getElementById('permBar').classList.remove('show');
      if (perm === 'granted') {
        showToast('알림이 활성화되었습니다!', '마감 임박 할일을 알려드릴게요.', 'info');
        checkAndNotify(false);
      }
    });
  }
}

function dismissPermBar() {
  document.getElementById('permBar').classList.remove('show');
  localStorage.setItem('task-notif-dismissed', 'true');
}

function initPermBar() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'granted') return;
  if (Notification.permission === 'denied') return;
  if (localStorage.getItem('task-notif-dismissed')) return;
  document.getElementById('permBar').classList.add('show');
}

function sendBrowserNotification(title, body) {
  if (!('Notification' in window)) return;
  if (Notification.permission !== 'granted') return;
  const n = new Notification(title, {
    body: body,
    icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y="80" font-size="80">📋</text></svg>',
    tag: 'task-manager',
    requireInteraction: false,
  });
  n.onclick = () => { window.focus(); n.close(); };
}

function checkAndNotify(manual) {
  const today = todayStr();
  const overdueTasks = tasks.filter(t => { const e = getEffectiveDueDate(t); return t.status !== 'done' && e && e < today; });
  const todayTasks = tasks.filter(t => { const e = getEffectiveDueDate(t); return t.status !== 'done' && e === today; });

  const tom = new Date(); tom.setDate(tom.getDate()+1);
  const tomStr = `${tom.getFullYear()}-${String(tom.getMonth()+1).padStart(2,'0')}-${String(tom.getDate()).padStart(2,'0')}`;
  const tomorrowTasks = tasks.filter(t => { const e = getEffectiveDueDate(t); return t.status !== 'done' && e === tomStr; });

  // In-app notification banner
  if (overdueTasks.length > 0 || todayTasks.length > 0) {
    let msg = '';
    if (overdueTasks.length > 0) msg += `<strong>지연 ${overdueTasks.length}건</strong> `;
    if (todayTasks.length > 0) msg += `<strong>오늘 마감 ${todayTasks.length}건</strong> `;
    msg += '이 있습니다.';
    document.getElementById('notifText').innerHTML = msg;
    document.getElementById('notifBanner').classList.add('show');
  }

  // Browser notification (avoid spam: once per hour)
  const notifSentKey = 'task-notif-sent-' + today;
  const lastSent = parseInt(localStorage.getItem(notifSentKey) || '0');
  const nowMs = Date.now();
  const oneHour = 60 * 60 * 1000;

  if (manual || (nowMs - lastSent > oneHour)) {
    let lines = [];
    if (overdueTasks.length > 0) {
      lines.push(`지연 ${overdueTasks.length}건:`);
      overdueTasks.slice(0, 3).forEach(t => lines.push(`  - ${t.student || ''} ${t.task}`));
    }
    if (todayTasks.length > 0) {
      lines.push(`오늘 마감 ${todayTasks.length}건:`);
      todayTasks.slice(0, 3).forEach(t => lines.push(`  - ${t.student || ''} ${t.task}`));
    }
    if (tomorrowTasks.length > 0) {
      lines.push(`내일 마감 ${tomorrowTasks.length}건:`);
      tomorrowTasks.slice(0, 3).forEach(t => lines.push(`  - ${t.student || ''} ${t.task}`));
    }

    if (lines.length > 0) {
      sendBrowserNotification('수업 관리 대시보드', lines.join('\n'));
      localStorage.setItem(notifSentKey, String(nowMs));
    } else if (manual) {
      showToast('알림 없음', '지연되거나 오늘 마감인 할일이 없습니다.', 'info');
    }
  }

  // In-app toast for manual
  if (manual) {
    if (overdueTasks.length > 0) {
      overdueTasks.forEach(t => {
        showToast(`지연: ${t.student || ''} ${t.task}`, `마감일 ${t.dueDate}`, 'danger');
      });
    }
    if (todayTasks.length > 0) {
      todayTasks.forEach(t => {
        showToast(`오늘 마감: ${t.student || ''} ${t.task}`, t.memo || '', 'warning');
      });
    }
    if (tomorrowTasks.length > 0) {
      tomorrowTasks.forEach(t => {
        showToast(`내일 마감: ${t.student || ''} ${t.task}`, t.memo || '', 'info');
      });
    }
  }
}

function closeNotifBanner() {
  document.getElementById('notifBanner').classList.remove('show');
}

// ===== Toast =====
function showToast(title, msg, type) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  const icon = type === 'danger' ? '&#128308;' : type === 'warning' ? '&#128992;' : '&#128309;';
  const cls = type === 'danger' ? 'danger' : type === 'warning' ? 'warning' : '';
  toast.className = `toast ${cls}`;
  toast.innerHTML = `
    <span class="toast-icon">${icon}</span>
    <div class="toast-body">
      <div class="toast-title">${esc(title)}</div>
      <div class="toast-msg">${esc(msg)}</div>
    </div>
    <button class="toast-close" onclick="this.parentElement.remove()">&times;</button>
  `;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.animation = 'slideOut 0.3s ease forwards';
    setTimeout(() => toast.remove(), 300);
  }, 5000);
}

// ===== Table View =====
function renderTable() {
  const container = document.getElementById('tableView');
  const data = getFiltered();
  const showArchived = document.getElementById('showArchived').checked;

  if (data.length === 0) {
    const msg = showArchived ? '보관된 작업이 없습니다.' : '할일이 없습니다. 새 할일을 추가해보세요!';
    container.innerHTML = `<div class="empty-state"><div class="icon">&#128203;</div><p>${msg}</p></div>`;
    return;
  }
  const today = todayStr();
  let html = '<table><thead><tr><th style="width:30px;"></th><th>학생</th><th>할 일</th><th>카테고리</th><th>추가일</th><th>마감일</th><th>상태</th><th>메모</th><th></th></tr></thead><tbody>';
  data.forEach(t => {
    const eff = getEffectiveDueDate(t);
    const isOverdue = eff && eff < today && t.status !== 'done';
    const isDone = t.status === 'done';
    const rowCls = isOverdue ? 'overdue' : isDone ? 'row-done' : '';
    const stepsInfo = getStepsDone(t);
    const hasSteps = t.steps && t.steps.length > 0;
    const isOpen = expandedTasks.has(t.id);
    const arrow = hasSteps ? `<span class="expand-icon${isOpen ? ' open' : ''}">&#9654;</span>` : '';

    // Priority badge
    const priBadge = t.priority && t.priority !== 'none' ? `<span class="priority-badge priority-${t.priority}">${priorityLabels[t.priority]}</span>` : '';

    html += `<tr${rowCls ? ` class="${rowCls}"` : ''} draggable="true" ondragstart="handleDragStart(event,'${t.id}')" ondragover="handleDragOver(event)" ondragend="handleDragEnd(event)" ondrop="handleDrop(event,'${t.id}')">`;

    // Drag handle
    html += `<td class="drag-handle" title="드래그하여 순서 변경">⋮⋮</td>`;

    html += `<td><strong>${esc(t.student || '-')}</strong></td>`;

    // Task cell: priority + clickable name + tags + inline steps
    let taskCell = `<div class="task-name" onclick="toggleExpand('${t.id}')">${arrow}${priBadge}${esc(t.task)}`;
    if (stepsInfo) {
      const pct = Math.round((stepsInfo.done / stepsInfo.total) * 100);
      taskCell += `<div class="mini-progress"><div class="mini-progress-bar"><div class="mini-progress-fill" style="width:${pct}%;background:${progressColor(pct)};"></div></div><span class="mini-progress-text">${stepsInfo.done}/${stepsInfo.total}</span></div>`;
    }
    taskCell += `</div>`;

    // Tags
    if (t.tags && t.tags.length > 0) {
      taskCell += `<div style="margin-top:4px;">`;
      t.tags.forEach(tag => {
        taskCell += `<span class="tag" onclick="event.stopPropagation();filterByTag('${esc(tag)}')">#${esc(tag)}</span>`;
      });
      taskCell += `</div>`;
    }

    // Inline expanded steps
    if (isOpen) {
      taskCell += `<div class="inline-steps">`;
      (t.steps || []).forEach(s => {
        taskCell += `<div class="inline-step">
          <input type="checkbox" ${s.done ? 'checked' : ''} onchange="toggleStep('${t.id}','${s.id}',this.checked)">
          <span class="step-label ${s.done ? 'done' : ''}">${esc(s.text)}</span>
          ${s.doneAt ? '<span class="step-time">' + esc(s.doneAt) + '</span>' : ''}
          <button class="inline-step-del" onclick="deleteStep('${t.id}','${s.id}')">&times;</button>
        </div>`;
      });
      taskCell += `<div class="inline-step-add">
        <input type="text" id="inlineStep_${t.id}" placeholder="새 단계 추가..." onkeydown="if(event.key==='Enter'){event.preventDefault();addInlineStep('${t.id}');}">
        <button onclick="addInlineStep('${t.id}')">추가</button>
      </div>`;
      taskCell += `</div>`;
    }
    html += `<td>${taskCell}</td>`;

    html += `<td><span class="cat-badge ${catClasses[t.category]}">${catLabels[t.category]}</span></td>`;
    html += `<td style="font-size:12px;color:var(--text-muted);white-space:nowrap;">${t.createdAt ? esc(t.createdAt.slice(0,10)) : '-'}</td>`;
    html += `<td>${dueDateDisplay(t.dueDate, t)}</td>`;
    html += `<td><span class="badge ${statusClasses[t.status]}">${statusLabels[t.status]}</span></td>`;
    html += `<td style="max-width:150px;font-size:13px;color:var(--text-muted);">${esc(t.memo || '')}</td>`;
    html += `<td class="action-btns">`;

    if (t.archived) {
      // Archived view buttons
      html += `<button title="복원" onclick="restoreTask('${t.id}')">↩️</button>`;
      html += `<button title="영구 삭제" onclick="quickDelete('${t.id}')">&#128465;</button>`;
    } else {
      // Normal view buttons
